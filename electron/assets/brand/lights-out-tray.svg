<?xml version="1.0" encoding="UTF-8"?>
<!-- Lights Out Tray Icon: bold glowing broken power ring. Ring-dominant, no lamp detail, built to survive 16px and 24px. -->
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="f-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="g-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#00FFD1"/>
      <stop offset="0.5" stop-color="#64FFF0"/>
      <stop offset="1"   stop-color="#00BFA6"/>
    </linearGradient>
  </defs>

  <!-- Bold broken ring: thick strokes + round caps so it reads as a glowing ring at 16px.
       Top gap holds the power notch; one flicker gap at lower-right keeps the broken-ring identity. -->
  <g filter="url(#f-glow)" fill="none" stroke="url(#g-ring)" stroke-width="8.5" stroke-linecap="round">
    <!-- Arc A: right side -->
    <path d="M 42 16.68 A 20 20 0 0 1 42 51.32"/>
    <!-- Arc B: bottom + left, up to the top gap -->
    <path d="M 34.1 53.9 A 20 20 0 0 1 22 16.68"/>
    <!-- Power notch: bold vertical bar protruding up through the top gap (classic power-button read).
         Solid color, not the gradient: a vertical line has a zero-width bbox so an objectBoundingBox gradient won't paint it. -->
    <line x1="32" y1="6" x2="32" y2="30" stroke="#3df5da"/>
  </g>
</svg>
