<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lo-grad" x1="40" y1="36" x2="216" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="0.5" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="lo-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Crescent-moon ring that doubles as a power button -->
  <g filter="url(#lo-glow)">
    <path d="M128 36
             a92 92 0 1 0 0 184
             a92 92 0 1 1 0 -184
             Z
             M128 70
             a58 58 0 1 1 0 116
             a58 58 0 1 0 0 -116
             Z"
          fill="url(#lo-grad)" fill-rule="evenodd" opacity="0.18"/>

    <!-- Open power ring (gap at top) -->
    <path d="M86 78 a58 58 0 1 0 84 0"
          stroke="url(#lo-grad)" stroke-width="20" stroke-linecap="round" fill="none"/>

    <!-- Power line notch -->
    <line x1="128" y1="58" x2="128" y2="116"
          stroke="url(#lo-grad)" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>
